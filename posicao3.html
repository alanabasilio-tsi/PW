<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Document</title>
</head>
<body>
    <div class="super">
    <p>O texto ao final desta sentença <span>está sobrescrito</span>.</p>
    </div>
    <div class="sub">
    <p>O texto ao final desta sentença <span>está subscrito</span>.</p>
    </div>
    <div class="shiftleft">
    <p>O texto ao final desta sentença <span>está deslocado à esquerda</span>.</p>
    </div>
    <div class="shiftright">
    <p>O texto ao final desta sentença <span>está deslocado à direita</span>.</p>
    </div>
</body>
</html>
