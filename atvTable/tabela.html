<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela 1</title>
    <link rel="stylesheet" href="tabela.css">
</head>
<body>
    <table>
       <caption>PREÇO DE FRUTAS</caption>
       <thread>
            <th>Frutas</th>
            <th>Preço</th>
        </thread> 
        <tbody>
        <tr>
            <td>Maçã</td>
            <td>R$0,40</td>
        </tr>
        <tr>
            <td>Laranja</td>
            <td>R$0,50</td>
        </tr>
        <tr>
            <td>Banana</td>
            <td>R$0,50</td>
            </tr>
       </tbody>
       <tfoot>
        <tr>
            <td>Total</td>
            <td>R$1,40</td>
        </tr>
       </tfoot>
    </table>
    
</body>
</html>
