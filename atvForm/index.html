<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <form>
       <strong><p><label for="nome">Nome</label></p></strong>
        <input type="text" id="nome" name="nome" size="25" maxlength="25">
        <strong><p><label for="matricula">Matrícula</label></p></strong>
        <input type="text" id="matricula" name="matricula" size="10" maxlength="10">
        <strong><p><label for="cargo">Cargo</p></strong>
            <select name="cargo">
                <option selected="selected">Professor</option>
                <option>Técnico Administrativo</option>
                <option>Técnico de Laboratório</option>
                <option>Pedagoga(o)</option>
                <option>Assistente de Alunos</option>
            </select>
        </label>
        <strong><p><label for="endereco">Endereço</label></p></strong>
        <input type="text" id="endereco" name="endereco" size="50" maxlength="50">
        <strong><p><label for="telefone">Telefone</label></p></strong>
        <input type="text" id="telefone" name="telefone" size="11" maxlength="11">
    </form>
</body>
</html>
